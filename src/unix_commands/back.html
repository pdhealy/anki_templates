<!-- HTML for Back Template -->
{{FrontSide}}

<hr class="divider" />

<div class="command-wrapper">
  <div class="command">{{Back}}</div>
  {{#Back}}
  <div class="example">
    <div class="example-section">
      <div class="example-label">Example Usage</div>
      <div class="example-content">
        <code class="example-command">{{Example Usage}}</code>
      </div>
    </div>
    <div class="example-section">
      <div class="example-label">Example Output</div>
      <div class="example-content">
        <code class="example-output">{{Example Output}}</code>
      </div>
    </div>
  </div>
  {{/Back}}
</div>

<script>
document.querySelectorAll('.example-label').forEach(function(label) {
    var content = label.nextElementSibling;
    var codeEl = content ? content.querySelector('code') : null;
    var rawText = codeEl ? codeEl.textContent : (content ? content.textContent : '');
    // Strip all whitespace, non-breaking spaces, zero-width spaces
    var isEmpty = rawText.replace(/[\s\u00a0\u200b\ufeff]/g, '') === '';

    if (isEmpty) {
        label.classList.add('is-empty');
        return;
    }

    var tapped = false;

    function toggle() {
        var isOpen = content.classList.contains('is-open');
        content.classList.toggle('is-open', !isOpen);
        label.classList.toggle('is-open', !isOpen);
    }

    label.addEventListener('touchstart', function(e) {
        tapped = true;
        toggle();
        e.preventDefault();
    }, { passive: false });

    label.addEventListener('click', function() {
        if (tapped) { tapped = false; return; }
        toggle();
    });
});
</script>
