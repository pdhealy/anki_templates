<!-- HTML for Front Template -->

<!-- Set font scale before elements render so CSS var resolves correctly on first paint -->
<script>
(function() {
    if (typeof window.ankiUnixFontScale === 'undefined') {
        var s = 1;
        try { s = parseFloat(localStorage.getItem('unixCardFontScale')) || 1; } catch(e) {}
        window.ankiUnixFontScale = Math.min(2, Math.max(0.5, s));
    }
    document.documentElement.style.setProperty('--font-scale', window.ankiUnixFontScale);
})();
</script>

<div class="card-header">
    <div class="topic">Linux Commands > {{Category}}</div>
    <div class="toggle-group">
        <div class="toggle-item">
            <span class="toggle-label">size <span id="fontScaleDisplay"></span></span>
            <div class="size-control">
                <button class="size-btn" id="sizeDecrease" title="Decrease font size">&#8722;</button>
                <button class="size-btn" id="sizeIncrease" title="Increase font size">+</button>
            </div>
        </div>
        <div class="toggle-item">
            <span class="toggle-label">Aa</span>
            <button class="font-toggle" id="fontToggle" title="Toggle dyslexia-friendly font">
                <span class="font-icon"></span>
            </button>
        </div>
        <div class="toggle-item">
            <span class="toggle-label">&#9790;</span>
            <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">
                <span class="theme-icon"></span>
            </button>
        </div>
    </div>
</div>

<div class="question">
    <div class="description">{{Front}}</div>
</div>

<script>
(function () {
    var fontScale = window.ankiUnixFontScale || 1;

    function updateScaleDisplay(s) {
        var el = document.getElementById('fontScaleDisplay');
        if (el) el.textContent = '(' + s.toFixed(1) + 'x)';
    }

    function applyInlineStyles(s) {
        document.querySelectorAll('.description').forEach(function(el) {
            el.style.fontSize = 'calc(clamp(29px, 2vw + 21px, 42px) * ' + s + ')';
        });
        document.querySelectorAll('.command').forEach(function(el) {
            el.style.fontSize = 'calc(clamp(39px, 3.9vw + 23px, 68px) * ' + s + ')';
        });
        document.querySelectorAll('.example-command').forEach(function(el) {
            el.style.fontSize = 'calc(clamp(39px, 3.9vw + 23px, 68px) * ' + s + ' * 0.75)';
        });
        // example-label and example-output use fixed sizes — not scaled by font buttons
    }

    function applyFontScale(scale) {
        fontScale = Math.min(2, Math.max(0.5, Math.round(scale * 10) / 10));
        window.ankiUnixFontScale = fontScale;
        applyInlineStyles(fontScale);
        updateScaleDisplay(fontScale);
        try { localStorage.setItem('unixCardFontScale', fontScale); } catch(e) {}
    }

    function applyFont(dyslexic) {
        document.body.classList.toggle('dyslexic', dyslexic);
        var btn = document.getElementById('fontToggle');
        if (btn) btn.classList.toggle('is-on', dyslexic);
    }

    function applyTheme(dark) {
        document.body.classList.toggle('dark-mode', dark);
        var btn = document.getElementById('themeToggle');
        if (btn) btn.classList.toggle('is-dark', dark);
    }

    function applyInlineMarkdown(text) {
        text = text.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
        text = text.replace(/\*([^*\n]+)\*/g,     '<em>$1</em>');
        text = text.replace(/`([^`\n]+)`/g,        '<code class="md-code">$1</code>');
        return text;
    }

    function renderMarkdown(el) {
        var html = el.innerHTML;
        // Normalise Anki's <br> line breaks to \n
        html = html.replace(/<br\s*\/?>/gi, '\n');
        var lines = html.split('\n');
        var out = [];
        var inList = false;
        lines.forEach(function(line) {
            var trimmed = line.trim();
            if (/^[-*] /.test(trimmed)) {
                if (!inList) { out.push('<ul class="md-list">'); inList = true; }
                out.push('<li>' + applyInlineMarkdown(trimmed.slice(2)) + '</li>');
            } else {
                if (inList) { out.push('</ul>'); inList = false; }
                out.push(applyInlineMarkdown(line));
            }
        });
        if (inList) out.push('</ul>');
        // Join with <br>, then tidy up breaks around block elements
        var result = out.join('<br>');
        result = result.replace(/<br>(<ul)/g, '$1').replace(/(<\/ul>)<br>/g, '$1');
        el.innerHTML = result;
    }

    document.querySelectorAll('.description').forEach(renderMarkdown);

    applyInlineStyles(fontScale);
    updateScaleDisplay(fontScale);

    try { applyFont(localStorage.getItem('unixCardDyslexic') === 'true'); } catch(e) {}
    try { applyTheme(localStorage.getItem('unixCardDarkMode') === 'true'); } catch(e) {}

    document.getElementById('sizeIncrease').addEventListener('click', function () {
        applyFontScale(fontScale + 0.1);
    });

    document.getElementById('sizeDecrease').addEventListener('click', function () {
        applyFontScale(fontScale - 0.1);
    });

    document.getElementById('fontToggle').addEventListener('click', function () {
        var isOn = document.body.classList.contains('dyslexic');
        try { localStorage.setItem('unixCardDyslexic', String(!isOn)); } catch(e) {}
        applyFont(!isOn);
    });

    document.getElementById('themeToggle').addEventListener('click', function () {
        var isDark = document.body.classList.contains('dark-mode');
        try { localStorage.setItem('unixCardDarkMode', String(!isDark)); } catch(e) {}
        applyTheme(!isDark);
    });
})();
</script>
