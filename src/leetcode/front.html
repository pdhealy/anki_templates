<!-- HTML for Front Template -->

<div class="card-header">
  <div class="topic">LeetCode</div>
</div>

<div class="lc-title">{{ID}}. {{Title}}</div>

<div class="lc-description">{{Description}}</div>

<div class="section-item">
  <div class="example-label">Examples</div>
  <div class="example-content">
    <div class="desc-body examples-body">{{Examples}}</div>
  </div>
</div>

<script>
  (function () {
    function applyInlineMarkdown(text) {
      text = text.replace(/\*\*([^*\n]+)\*\*/g, "<strong>$1</strong>");
      text = text.replace(/\*([^*\n]+)\*/g, "<em>$1</em>");
      text = text.replace(/`([^`\n]+)`/g, '<code class="md-code">$1</code>');
      return text;
    }

    function renderMarkdown(el) {
      var html = el.innerHTML;
      html = html.replace(/<br\s*\/?>/gi, "\n");
      var lines = html.split("\n");
      var out = [];
      var inList = false;
      lines.forEach(function (line) {
        var trimmed = line.trim();
        if (/^[-*] /.test(trimmed)) {
          if (!inList) {
            out.push('<ul class="md-list">');
            inList = true;
          }
          out.push("<li>" + applyInlineMarkdown(trimmed.slice(2)) + "</li>");
        } else {
          if (inList) {
            out.push("</ul>");
            inList = false;
          }
          out.push(applyInlineMarkdown(line));
        }
      });
      if (inList) out.push("</ul>");
      var result = out.join("<br>");
      result = result
        .replace(/<br>(<ul)/g, "$1")
        .replace(/(<\/ul>)<br>/g, "$1");
      el.innerHTML = result;
    }

    window.ankiRenderMarkdown = renderMarkdown;

    document
      .querySelectorAll(".lc-description, .examples-body")
      .forEach(renderMarkdown);

    // ── Toggle expandable sections ──
    document
      .querySelectorAll(".example-label:not([data-lc-init])")
      .forEach(function (label) {
        label.setAttribute("data-lc-init", "1");

        var content = label.nextElementSibling;
        var bodyEl = content ? content.querySelector(".desc-body") : null;
        var rawText = bodyEl
          ? bodyEl.textContent
          : content
            ? content.textContent
            : "";
        var isEmpty = rawText.replace(/[\s\u00a0\u200b\ufeff]/g, "") === "";

        if (isEmpty) {
          label.classList.add("is-empty");
          return;
        }

        var tapped = false;

        function toggle() {
          var isOpen = content.classList.contains("is-open");
          content.classList.toggle("is-open", !isOpen);
          label.classList.toggle("is-open", !isOpen);
        }

        label.addEventListener(
          "touchstart",
          function (e) {
            tapped = true;
            toggle();
            e.preventDefault();
          },
          { passive: false },
        );

        label.addEventListener("click", function () {
          if (tapped) {
            tapped = false;
            return;
          }
          toggle();
        });
      });
  })();
</script>
