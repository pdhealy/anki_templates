<!-- HTML for Front Template -->
<div class="topic"> {{Category_Chinese}} ({{Category_Zhuyin}}) | {{Category_English}}  </div>

<!-- <span style="font-size: 150px; "class=mainCharacter>{{Front}}</span> -->
<div class=mainCharacter>{{Front}}</div>
<div class="example-chinese">{{Example_Chinese}}</div>
<div id="zhuyinData" style="display:none">{{Back}}</div>

<script>
  (function () {
    const el = document.querySelector('.mainCharacter');
    const chars = [...el.textContent.trim()];
    const zhuyinArr = document.getElementById('zhuyinData').textContent.trim().split(' ');
    el.innerHTML = chars.map((char, i) =>
      `<ruby>${char}<rt>${zhuyinArr[i] || ''}</rt></ruby>`
    ).join('');
  })();
</script>
