<!DOCTYPE html>
<html>
<head>
<style>
body { font-family: sans-serif; background: #f8f9fa; }
.mainCharacter {
  writing-mode: horizontal-tb;
  font-size: 14rem;
  line-height: 1.5;
  display: inline-flex;
  align-items: center;
  margin: 20px 0;
  color: #1a1a1a;
  text-shadow: 2px 2px 3px rgba(0,0,0,0.2);
}
.char-group {
  display: inline-flex;
  flex-direction: row;
  align-items: center;
}
.char-zhuyin {
  writing-mode: vertical-lr;
  font-size: 0.2em;
  line-height: 1;
  letter-spacing: 0.5em;
  align-self: center;
  opacity: 1;
  transition: opacity 0.3s ease;
  text-shadow: none;
}
</style>
</head>
<body>
<div class="mainCharacter">
  <span class="char-group">別<span class="char-zhuyin">ㄅㄧㄝˊ</span></span>
</div>
</body>
</html>
