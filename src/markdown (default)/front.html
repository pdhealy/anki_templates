<div id="header">{{ID}} | {{Resource}} | {{Category}}</div>

<div id="front">{{Front}}</div>

<script>
  (function () {
    function getScript(path, altURL) {
      return new Promise(function (resolve, reject) {
        var script = document.createElement("script");
        script.onload = resolve;
        script.onerror = function () {
          var s = document.createElement("script");
          s.onload = resolve;
          s.onerror = reject;
          s.src = altURL;
          document.head.appendChild(s);
        };
        script.src = path;
        document.head.appendChild(script);
      });
    }

    function getCSS(path, altURL) {
      return new Promise(function (resolve, reject) {
        var css = document.createElement("link");
        css.setAttribute("rel", "stylesheet");
        css.type = "text/css";
        css.onload = resolve;
        css.onerror = function () {
          var c = document.createElement("link");
          c.setAttribute("rel", "stylesheet");
          c.type = "text/css";
          c.onload = resolve;
          c.onerror = reject;
          c.href = altURL;
          document.head.appendChild(c);
        };
        css.href = path;
        document.head.appendChild(css);
      });
    }

    Promise.all([
      getCSS(
        "_katex.min.css",
        "https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css",
      ),
      getCSS(
        "_highlight.css",
        "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.0.1/styles/github.min.css",
      ),
      getScript(
        "_katex.min.js",
        "https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js",
      ),
      getScript(
        "_highlight.js",
        "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.0.1/highlight.min.js",
      ),
      getScript(
        "_markdown-it.min.js",
        "https://cdnjs.cloudflare.com/ajax/libs/markdown-it/12.0.4/markdown-it.min.js",
      ),
      getScript(
        "_markdown-it-mark.js",
        "https://cdn.jsdelivr.net/gh/Jwrede/Anki-KaTeX-Markdown/_markdown-it-mark.js",
      ),
      getScript(
        "_markdown-it-texmath.js",
        "https://cdn.jsdelivr.net/npm/markdown-it-texmath@1.0.0/texmath.min.js",
      ),
    ])
      .then(render)
      .catch(function () {});

    function render() {
      renderMarkdownField("front");
      addLineNumbers(document.getElementById("front"));
    }

    function cleanHeader() {
      var el = document.getElementById("header");
      if (!el) return;
      var parts = el.textContent
        .split("|")
        .map(function (s) {
          return s.trim();
        })
        .filter(Boolean);
      el.textContent = parts.join(" | ");
    }

    cleanHeader();

    function addLineNumbers(container) {
      if (!container) return;
      container.querySelectorAll("pre > code").forEach(function (code) {
        var lines = code.innerHTML.split("\n");
        if (lines.length && lines[lines.length - 1] === "") lines.pop();
        var numWidth = String(lines.length).length + "ch";
        var html = '<div class="code-lines">';
        lines.forEach(function (line, idx) {
          html += '<div class="code-line">';
          html +=
            '<span class="line-num" style="width:' +
            numWidth +
            '">' +
            (idx + 1) +
            "</span>";
          html += '<span class="line-code">' + line + "</span>";
          html += "</div>";
        });
        html += "</div>";
        var wrapper = document.createElement("div");
        wrapper.className = "code-block";
        wrapper.innerHTML = html;
        code.parentNode.parentNode.replaceChild(wrapper, code.parentNode);
      });
    }

    function normalizeListIndent(raw) {
      var lines = raw.split("\n");
      var out = [];
      var inFence = false;
      var fenceChar = "";
      var prevNonEmpty = "";
      lines.forEach(function (line) {
        var fenceMatch = line.match(/^\s*(```+|~~~+)/);
        if (fenceMatch) {
          var marker = fenceMatch[1][0];
          if (!inFence) {
            inFence = true;
            fenceChar = marker;
          } else if (marker === fenceChar) {
            inFence = false;
            fenceChar = "";
          }
          out.push(line);
          if (line.trim() !== "") prevNonEmpty = line;
          return;
        }

        if (!inFence && /^\s{4,}[-*+]\s+/.test(line)) {
          if (!/^\s*(?:[-*+]|\d+\.)\s+/.test(prevNonEmpty)) {
            line = line.replace(/^\s+([-*+]\s+)/, "$1");
          }
        }

        out.push(line);
        if (line.trim() !== "") prevNonEmpty = line;
      });
      return out.join("\n");
    }

    function unwrapOuterMarkdownFence(raw) {
      var trimmed = raw.trim();
      var match = trimmed.match(
        /^(?:```|~~~)\s*(?:markdown|md)?\s*\n([\s\S]*?)\n(?:```|~~~)\s*$/i,
      );
      return match ? match[1] : raw;
    }

    function renderMarkdownField(ID) {
      var el = document.getElementById(ID);
      if (!el) return;
      var prevWS = el.style.whiteSpace;
      el.style.whiteSpace = "pre";
      var raw =
        typeof el.innerText !== "undefined" ? el.innerText : el.textContent;
      el.style.whiteSpace = prevWS;
      raw = raw
        .replace(/\r\n?/g, "\n")
        .replace(/\u2003/g, "    ")
        .replace(/\u2002/g, "  ")
        .replace(/\t/g, "    ")
        .replace(/\u00a0/g, " ");
      raw = unwrapOuterMarkdownFence(raw);
      raw = normalizeListIndent(raw);
      var md = new markdownit({
        typographer: true,
        html: true,
        highlight: function (str, lang) {
          if (lang && hljs.getLanguage(lang)) {
            try {
              return hljs.highlight(str, { language: lang }).value;
            } catch (__) {}
          }
          return "";
        },
      })
        .use(markdownItMark)
        .use(texmath, {
          engine: katex,
          delimiters: "dollars",
          katexOptions: { throwOnError: false },
        });
      el.innerHTML = md.render(raw);
    }
  })();
</script>
