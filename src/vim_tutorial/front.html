<!-- HTML for Front Template -->
<link rel="stylesheet" href="https://fonts.cdnfonts.com/css/open-dyslexic">

<!-- Toggle controls -->
<div class="toggle-group">
    <button class="font-toggle" id="fontToggle" onclick="toggleFont()" title="Toggle dyslexia-friendly font">
        <span class="font-icon"></span>
    </button>
    <button class="theme-toggle" id="themeToggle" onclick="toggleDarkMode()" title="Toggle dark/light mode">
        <span class="theme-icon"></span>
    </button>
</div>

<script>
(function () {
    function applyTheme(dark) {
        document.body.classList.toggle('dark-mode', dark);
        var btn = document.getElementById('themeToggle');
        if (btn) btn.classList.toggle('is-dark', dark);
    }

    function applyFont(dyslexic) {
        document.body.classList.toggle('dyslexic', dyslexic);
        var btn = document.getElementById('fontToggle');
        if (btn) btn.classList.toggle('is-on', dyslexic);
    }

    applyTheme(localStorage.getItem('vimCardDarkMode') === 'true');
    applyFont(localStorage.getItem('vimCardDyslexic') === 'true');

    window.toggleDarkMode = function () {
        var isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('vimCardDarkMode', String(!isDark));
        applyTheme(!isDark);
    };

    window.toggleFont = function () {
        var isOn = document.body.classList.contains('dyslexic');
        localStorage.setItem('vimCardDyslexic', String(!isOn));
        applyFont(!isOn);
    };
})();
</script>

<div class="topic">VIM | Vi IMproved | Commands</div>

<div class="question">
    <div class="description">{{Front}}</div>
</div>
