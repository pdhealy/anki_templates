<!-- HTML for Front Template -->

<style>
#timer-bar-container {
  position: absolute;
  left: 0;
  width: 100%;
  height: 8px;
  background: var(--surface, #d8d8d8);
  z-index: 100;
  pointer-events: none;
}
#timer-bar {
  height: 100%;
  width: 100%;
  background-color: var(--subtle, #9a9ea8);
  transform: scaleX(0);
  transform-origin: left center;
}
@keyframes timerFill {
  from { transform: scaleX(0); }
  to   { transform: scaleX(1); }
}
#timer-display {
  position: absolute;
  right: 1.5rem;
  font-family: 'JetBrains Mono', 'Fira Code', 'Menlo', monospace;
  font-size: clamp(2.5rem, 5vw, 4rem);
  font-weight: 700;
  color: var(--text, #2b2e37);
  opacity: 0.1;
  z-index: 0;
  pointer-events: none;
  letter-spacing: 0.05em;
  user-select: none;
}
</style>

<div id="timer-bar-container">
    <div id="timer-bar"></div>
</div>
<div id="timer-display">03:00</div>

<div class="card-header">
  <div class="topic">Security Engineer > Questions</div>
</div>

<div class="scenario-header">Question {{Question_No}}</div>

<div class="question">
  <div class="description">{{Front}}</div>
</div>

<script>
  (function () {
    function applyInlineMarkdown(text) {
      text = text.replace(/\*\*([^*\n]+)\*\*/g, "<strong>$1</strong>");
      text = text.replace(/\*([^*\n]+)\*/g, "<em>$1</em>");
      text = text.replace(/`([^`\n]+)`/g, '<code class="md-code">$1</code>');
      return text;
    }

    function renderMarkdown(el) {
      var html = el.innerHTML;
      html = html.replace(/<br\s*\/?>/gi, "\n");
      var lines = html.split("\n");
      var out = [];
      var inList = false;
      lines.forEach(function (line) {
        var trimmed = line.trim();
        if (/^[-*] /.test(trimmed)) {
          if (!inList) {
            out.push('<ul class="md-list">');
            inList = true;
          }
          out.push("<li>" + applyInlineMarkdown(trimmed.slice(2)) + "</li>");
        } else {
          if (inList) {
            out.push("</ul>");
            inList = false;
          }
          out.push(applyInlineMarkdown(line));
        }
      });
      if (inList) out.push("</ul>");
      var result = out.join("<br>");
      result = result
        .replace(/<br>(<ul)/g, "$1")
        .replace(/(<\/ul>)<br>/g, "$1");
      el.innerHTML = result;
    }

    window.ankiRenderMarkdown = renderMarkdown;

    document.querySelectorAll(".description").forEach(renderMarkdown);
  })();

// ── Timer bar ──
(function () {
    var DURATION = 180; // seconds
    var startKey = 'ankiScenarioTimerStart';
    var now = Date.now();
    var elapsed = 0;

    try {
        var stored = parseInt(localStorage.getItem(startKey));
        if (stored && (now - stored) < DURATION * 1000) {
            elapsed = (now - stored) / 1000;
        } else {
            localStorage.setItem(startKey, now);
            elapsed = 0;
        }
    } catch (e) {
        elapsed = 0;
    }

    // ── Pin to viewport bottom (works on iOS WKWebView) ──
    var container = document.getElementById('timer-bar-container');
    var display   = document.getElementById('timer-display');
    function pinLoop() {
        var viewH     = window.innerHeight || document.documentElement.clientHeight || 600;
        var parent    = (container && container.offsetParent) || document.body;
        var parentTop = parent.getBoundingClientRect().top;
        var base      = viewH - parentTop;
        if (container) container.style.top = (base - 8)  + 'px';
        if (display)   display.style.top   = (base - 80) + 'px';
        requestAnimationFrame(pinLoop);
    }
    requestAnimationFrame(pinLoop);

    var bar = document.getElementById('timer-bar');
    if (bar) {
        bar.style.animationName = 'none';
        bar.offsetWidth; // trigger reflow
        bar.style.animationName           = 'timerFill';
        bar.style.animationDuration       = DURATION + 's';
        bar.style.animationTimingFunction = 'linear';
        bar.style.animationFillMode       = 'forwards';
        bar.style.animationDelay          = elapsed > 0 ? ('-' + elapsed + 's') : '0s';
    }

    // ── Countdown display ──
    function updateDisplay() {
        if (!display) return;
        var remaining = Math.max(0, DURATION - ((Date.now() - (parseInt(localStorage.getItem(startKey)) || now)) / 1000));
        var mins = Math.floor(remaining / 60);
        var secs = Math.floor(remaining % 60);
        display.textContent = (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;
    }
    updateDisplay();
    setInterval(updateDisplay, 1000);
})();
</script>
