{{FrontSide}}

<hr id=answer>

<div id="back">{{Back}}</div>

<script>
(function () {
  function getScript(path, altURL) {
    return new Promise(function (resolve, reject) {
      var script = document.createElement("script");
      script.onload = resolve;
      script.onerror = function () {
        var s = document.createElement("script");
        s.onload = resolve;
        s.onerror = reject;
        s.src = altURL;
        document.head.appendChild(s);
      };
      script.src = path;
      document.head.appendChild(script);
    });
  }

  function getCSS(path, altURL) {
    return new Promise(function (resolve, reject) {
      var css = document.createElement("link");
      css.setAttribute("rel", "stylesheet");
      css.type = "text/css";
      css.onload = resolve;
      css.onerror = function () {
        var c = document.createElement("link");
        c.setAttribute("rel", "stylesheet");
        c.type = "text/css";
        c.onload = resolve;
        c.onerror = reject;
        c.href = altURL;
        document.head.appendChild(c);
      };
      css.href = path;
      document.head.appendChild(css);
    });
  }

  Promise.all([
    getCSS("_highlight.css", "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.0.1/styles/default.min.css"),
    getScript("_highlight.js", "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.0.1/highlight.min.js"),
    getScript("_markdown-it.min.js", "https://cdnjs.cloudflare.com/ajax/libs/markdown-it/12.0.4/markdown-it.min.js"),
    getScript("_markdown-it-mark.js", "https://cdn.jsdelivr.net/gh/Jwrede/Anki-KaTeX-Markdown/_markdown-it-mark.js")
  ]).then(render).catch(function () {});

  function render() {
    renderMarkdownField("back");
  }

  function renderMarkdownField(ID) {
    var el = document.getElementById(ID);
    if (!el) return;
    var raw = el.innerHTML
      .replace(/\r\n?/g, "\n")
      .replace(/<div[^>]*>/gi, "\n")
      .replace(/<\/div>/gi, "")
      .replace(/<p[^>]*>/gi, "\n")
      .replace(/<\/p>/gi, "")
      .replace(/<br\s*\/?>/gi, "\n")
      .replace(/<[^>]*>/g, "")
      .replace(/&nbsp;/g, " ")
      .replace(/&emsp;/g, "    ")
      .replace(/&ensp;/g, "  ")
      .replace(/&amp;/g, "&")
      .replace(/&lt;/g, "<")
      .replace(/&gt;/g, ">")
      .replace(/&quot;/g, '"')
      .replace(/\u2003/g, "    ")
      .replace(/\u2002/g, "  ")
      .replace(/\t/g, "    ")
      .replace(/\u00a0/g, " ")
      .replace(/^\n+/, "");
    var md = new markdownit({ typographer: true, html: true, highlight: function (str, lang) {
      if (lang && hljs.getLanguage(lang)) {
        try { return hljs.highlight(str, { language: lang }).value; } catch (__) {}
      }
      return "";
    }}).use(markdownItMark);
    el.innerHTML = md.render(raw);
  }
})();
</script>
