<!-- Back Template -->
<div class="card">
  <div class="card-header">
    <div class="topic">{{Level_Name}} | {{Chapter_Name}}</div>
  </div>
  <div class="lc-title">{{Front}}</div>

  <hr class="divider" />

  <div class="sections">
    <div class="section-item">
      <div class="example-label">Answer</div>
      <div class="example-content">
        <div id="back" class="desc-body">{{Back}}</div>
      </div>
    </div>
    <div class="section-item">
      <div class="code-label"><span class="code-icon">&lt;/&gt;</span> Code</div>
      <div class="code-content">{{Code_Sample}}</div>
    </div>
    <div class="section-item">
      <div class="example-label">Markdown Testing</div>
      <div class="example-content">
        <div id="markdown_testing" class="desc-body">{{Markdown_Testing}}</div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  // ── Python syntax highlighter ──
  var kwSet = new Set(
    "False,None,True,and,as,assert,async,await,break,class,continue,def,del,elif,else,except,finally,for,from,global,if,import,in,is,lambda,nonlocal,not,or,pass,raise,return,try,while,with,yield".split(",")
  );
  var biSet = new Set(
    "abs,all,any,bin,callable,chr,dir,divmod,enumerate,eval,exec,filter,format,getattr,globals,hasattr,hash,help,hex,id,input,isinstance,issubclass,iter,len,locals,map,max,memoryview,min,next,oct,open,ord,pow,print,property,range,repr,reversed,round,setattr,slice,sorted,staticmethod,sum,super,vars,zip,heapq,bisect,math,sys,os,collections,functools,itertools,typing".split(",")
  );
  var tySet = new Set(
    "bool,bytearray,bytes,complex,dict,float,frozenset,int,list,object,set,str,tuple,type,List,Dict,Set,Tuple,Optional,Union,Any,Callable,Sequence,Iterator,Generator,Type,DefaultDict,Counter,deque".split(",")
  );

  function esc(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function highlightPython(line) {
    var out = "";
    var i = 0;
    while (i < line.length) {
      var ch = line[i];

      if (ch === "#") {
        out += '<span class="py-cm">' + esc(line.slice(i)) + "</span>";
        break;
      }

      if (ch === '"' || ch === "'") {
        var q = ch;
        var j = i + 1;
        while (j < line.length && line[j] !== q) {
          if (line[j] === "\\") j++;
          j++;
        }
        j++;
        out += '<span class="py-str">' + esc(line.slice(i, j)) + "</span>";
        i = j;
        continue;
      }

      if (/\d/.test(ch)) {
        var j = i;
        while (j < line.length && /[\d._xXbBoO]/.test(line[j])) j++;
        out += '<span class="py-num">' + esc(line.slice(i, j)) + "</span>";
        i = j;
        continue;
      }

      if (ch === "@") {
        var j = i + 1;
        while (j < line.length && /\w/.test(line[j])) j++;
        out += '<span class="py-dec">' + esc(line.slice(i, j)) + "</span>";
        i = j;
        continue;
      }

      if (/[a-zA-Z_]/.test(ch)) {
        var j = i;
        while (j < line.length && /\w/.test(line[j])) j++;
        var word = line.slice(i, j);
        if (kwSet.has(word)) {
          out += '<span class="py-kw">' + esc(word) + "</span>";
        } else if (tySet.has(word)) {
          out += '<span class="py-ty">' + esc(word) + "</span>";
        } else if (biSet.has(word)) {
          out += '<span class="py-bi">' + esc(word) + "</span>";
        } else {
          out += esc(word);
        }
        i = j;
        continue;
      }

      out += esc(ch);
      i++;
    }
    return out;
  }

  function buildLineContent(line) {
    var spaces = 0;
    while (spaces < line.length && line[spaces] === " ") spaces++;
    var code = line.slice(spaces);
    var html = "";
    var levels = Math.floor(spaces / 4);
    var remainder = spaces % 4;
    for (var k = 0; k < levels; k++) {
      html += '<span class="ig">    </span>';
    }
    if (remainder > 0) html += " ".repeat(remainder);
    html += highlightPython(code);
    return html;
  }

  function renderCodeBlock(el) {
    var prevWS = el.style.whiteSpace;
    el.style.whiteSpace = "pre";
    var raw = typeof el.innerText !== "undefined" ? el.innerText : el.textContent;
    el.style.whiteSpace = prevWS;

    raw = raw
      .replace(/\r\n?/g, "\n")
      .replace(/\u2003/g, "    ")
      .replace(/\u2002/g, "  ")
      .replace(/\t/g, "    ")
      .replace(/\u00a0/g, " ");

    var lines = raw.split("\n");
    while (lines.length && lines[0].trim() === "") lines.shift();
    while (lines.length && lines[lines.length - 1].trim() === "") lines.pop();

    if (!lines.length) return;

    var html = '<div class="code-block"><div class="code-lines">';
    lines.forEach(function (line, idx) {
      html += '<div class="code-line">';
      html += '<span class="line-num">' + (idx + 1) + "</span>";
      html += '<span class="line-code">' + buildLineContent(line) + "</span>";
      html += "</div>";
    });
    html += "</div></div>";

    el.outerHTML = html;
  }

  // ── Resource loading ──
  function getScript(path, altURL) {
    return new Promise(function (resolve, reject) {
      var script = document.createElement("script");
      script.onload = resolve;
      script.onerror = function () {
        var script_online = document.createElement("script");
        script_online.onload = resolve;
        script_online.onerror = reject;
        script_online.src = altURL;
        document.head.appendChild(script_online);
      };
      script.src = path;
      document.head.appendChild(script);
    });
  }

  function getCSS(path, altURL) {
    return new Promise(function (resolve, reject) {
      var css = document.createElement("link");
      css.setAttribute("rel", "stylesheet");
      css.type = "text/css";
      css.onload = resolve;
      css.onerror = function () {
        var css_online = document.createElement("link");
        css_online.setAttribute("rel", "stylesheet");
        css_online.type = "text/css";
        css_online.onload = resolve;
        css_online.onerror = reject;
        css_online.href = altURL;
        document.head.appendChild(css_online);
      };
      css.href = path;
      document.head.appendChild(css);
    });
  }

  var getResources = [
    getCSS("_katex.css", "https://cdn.jsdelivr.net/npm/katex@0.12.0/dist/katex.min.css"),
    getCSS("_highlight.css", "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.0.1/styles/default.min.css"),
    getScript("_highlight.js", "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.0.1/highlight.min.js"),
    getScript("_katex.min.js", "https://cdn.jsdelivr.net/npm/katex@0.12.0/dist/katex.min.js"),
    getScript("_auto-render.js", "https://cdn.jsdelivr.net/gh/Jwrede/Anki-KaTeX-Markdown/auto-render-cdn.js"),
    getScript("_markdown-it.min.js", "https://cdnjs.cloudflare.com/ajax/libs/markdown-it/12.0.4/markdown-it.min.js"),
    getScript("_markdown-it-mark.js", "https://cdn.jsdelivr.net/gh/Jwrede/Anki-KaTeX-Markdown/_markdown-it-mark.js")
  ];

  Promise.all(getResources)
    .then(function () { return getScript("_mhchem.js", "https://cdn.jsdelivr.net/npm/katex@0.13.11/dist/contrib/mhchem.min.js"); })
    .then(render)
    .catch(function () {});

  // ── Render callback ──
  function render() {
    // Code_Sample: rendered with Python syntax highlighter + line numbers
    var codeContent = document.querySelector(".code-content");
    if (codeContent) renderCodeBlock(codeContent);

    // Back/Answer: KaTeX math + full markdown-it
    renderMath("back");
    markdown("back");

    // Markdown Testing: full markdown-it with fenced code block support
    renderMarkdownField("markdown_testing");

    // Toggle expandable sections
    document.querySelectorAll(".example-label:not([data-lc-init])").forEach(function (label) {
      label.setAttribute("data-lc-init", "1");

      var content = label.nextElementSibling;
      var bodyEl = content ? content.querySelector(".desc-body") : null;
      var rawText = bodyEl
        ? bodyEl.textContent
        : content
          ? content.textContent
          : "";
      var isEmpty = rawText.replace(/[\s\u00a0\u200b\ufeff]/g, "") === "";

      if (isEmpty) {
        label.classList.add("is-empty");
        return;
      }

      var tapped = false;

      function toggle() {
        var isOpen = content.classList.contains("is-open");
        content.classList.toggle("is-open", !isOpen);
        label.classList.toggle("is-open", !isOpen);
      }

      label.addEventListener(
        "touchstart",
        function (e) {
          tapped = true;
          toggle();
          e.preventDefault();
        },
        { passive: false }
      );

      label.addEventListener("click", function () {
        if (tapped) {
          tapped = false;
          return;
        }
        toggle();
      });
    });
  }

  // ── Full markdown-it renderer (handles fenced code blocks correctly) ──
  function renderMarkdownField(ID) {
    var el = document.getElementById(ID);
    if (!el) return;
    // Use innerText with white-space:pre to correctly extract raw markdown from
    // Anki HTML fields, avoiding the </div>-not-stripped bug in replaceInString.
    var prevWS = el.style.whiteSpace;
    el.style.whiteSpace = "pre";
    var raw = typeof el.innerText !== "undefined" ? el.innerText : el.textContent;
    el.style.whiteSpace = prevWS;
    // Normalise whitespace variants Anki may insert
    raw = raw
      .replace(/\r\n?/g, "\n")
      .replace(/\u2003/g, "    ")
      .replace(/\u2002/g, "  ")
      .replace(/\t/g, "    ")
      .replace(/\u00a0/g, " ");
    var md = new markdownit({ typographer: true, html: true, highlight: function (str, lang) {
      if (lang && hljs.getLanguage(lang)) {
        try { return hljs.highlight(str, { language: lang }).value; } catch (__) {}
      }
      return "";
    }}).use(markdownItMark);
    el.innerHTML = md.render(raw);
  }

  // ── KaTeX + markdown-it helpers for the Answer field ──
  function renderMath(ID) {
    var el = document.getElementById(ID);
    if (!el) return;
    var text = replaceInString(el.innerHTML);
    el.textContent = text;
    renderMathInElement(el, {
      delimiters: [
        { left: "$$", right: "$$", display: true },
        { left: "$",  right: "$",  display: false }
      ],
      throwOnError: false
    });
  }

  function markdown(ID) {
    var el = document.getElementById(ID);
    if (!el) return;
    var md = new markdownit({ typographer: true, html: true, highlight: function (str, lang) {
      if (lang && hljs.getLanguage(lang)) {
        try { return hljs.highlight(str, { language: lang }).value; } catch (__) {}
      }
      return "";
    }}).use(markdownItMark);
    var text = replaceHTMLElementsInString(el.innerHTML);
    text = md.render(text);
    el.innerHTML = text.replace(/&lt;\/span&gt;/gi, "\\");
  }

  function replaceInString(str) {
    str = str.replace(/<[\/]?pre[^>]*>/gi, "");
    str = str.replace(/<br\s*[\/]?[^>]*>/gi, "\n");
    str = str.replace(/<div[^>]*>/gi, "\n");
    str = str.replace(/<[\/]?span[^>]*>/gi, "");
    return replaceHTMLElementsInString(str);
  }

  function replaceHTMLElementsInString(str) {
    str = str.replace(/&nbsp;/gi, " ");
    str = str.replace(/&tab;/gi, "\t");
    str = str.replace(/&gt;/gi, ">");
    str = str.replace(/&lt;/gi, "<");
    return str.replace(/&amp;/gi, "&");
  }
})();
</script>
